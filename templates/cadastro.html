<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro - DIM</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    width:450px;
    padding:35px;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    text-align:center;
}

.logo{
    font-size:55px;
    font-weight:bold;
    color:#1565C0;
    margin-bottom:5px;
}

.subtitulo{
    font-size:16px;
    color:#666;
    margin-bottom:25px;
}

h2{
    color:#1565C0;
    margin-bottom:25px;
    font-size:30px;
}

.form-group{
    text-align:left;
    margin-bottom:18px;
}

.form-group label{
    display:block;
    font-weight:bold;
    margin-bottom:6px;
    font-size:16px;
    color:#333;
}

.form-group input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
}

.botao{
    width:100%;
    padding:14px;
    background:#FBC02D;
    border:none;
    border-radius:10px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.botao:hover{
    background:#f0b400;
}

.login{
    margin-top:20px;
    font-size:16px;
}

.login a{
    color:#1565C0;
    text-decoration:none;
    font-weight:bold;
}

.login a:hover{
    text-decoration:underline;
}

</style>

</head>
<body>

<div class="container">

    <div class="logo">
        DIM
    </div>

    <div class="subtitulo">
        Daily Interactive Management
    </div>

    <h2>Cadastro</h2>

    <form method="POST">

        <div class="form-group">
            <label>Nome</label>
            <input type="text" name="nome" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Senha</label>
            <input type="password" name="senha" required>
        </div>

        <button class="botao" type="submit">
            Cadastrar
        </button>

    </form>

    <div class="login">
        Já possui conta?
        <a href="/login">Faça login</a>
    </div>

</div>

</body>
</html>
