<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Editar Tarefa - DIM</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
padding:30px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0px 3px 15px rgba(0,0,0,0.1);
}

h1{
color:#1565C0;
margin-bottom:25px;
text-align:center;
}

label{
display:block;
font-weight:bold;
margin-top:15px;
margin-bottom:5px;
}

input,
select{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
}

.botao{
margin-top:25px;
width:100%;
padding:14px;
border:none;
background:#1565C0;
color:white;
font-size:18px;
font-weight:bold;
border-radius:10px;
cursor:pointer;
}

.voltar{
display:block;
text-align:center;
margin-top:15px;
text-decoration:none;
color:#1565C0;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>Editar Tarefa</h1>

<form method="POST">

<label>Tarefa</label>
<input
type="text"
name="tarefa"
value="{{ tarefa[1] }}"
required>

<label>Prioridade</label>

<select name="prioridade">

<option value="Baixa"
{% if tarefa[4] == "Baixa" %}selected{% endif %}>
Baixa
</option>

<option value="Média"
{% if tarefa[4] == "Média" %}selected{% endif %}>
Média
</option>

<option value="Alta"
{% if tarefa[4] == "Alta" %}selected{% endif %}>
Alta
</option>

</select>

<label>Prazo</label>

<input
type="date"
name="prazo"
value="{{ tarefa[5] }}">

<label>Responsável</label>

<input
type="text"
name="responsavel"
value="{{ tarefa[6] }}">

<button class="botao" type="submit">
Salvar Alterações
</button>

</form>

<a href="/dashboard" class="voltar">
Voltar ao Dashboard
</a>

</div>

</body>
</html>
