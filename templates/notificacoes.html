<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Notificações - DIM</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
padding:30px;
}

.topo{
background:#1565C0;
color:white;
padding:25px;
border-radius:15px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
box-shadow:0px 5px 15px rgba(0,0,0,0.2);
}

.logo h1{
font-size:45px;
}

.logo p{
font-size:16px;
opacity:0.9;
}

.menu{
display:flex;
gap:10px;
}

.menu a{
text-decoration:none;
}

.menu button{
background:white;
color:#1565C0;
border:none;
padding:12px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.menu .sair{
background:#FBC02D;
color:black;
}

.container{
display:flex;
gap:25px;
justify-content:center;
align-items:flex-start;
}

.lista{
background:white;
width:850px;
padding:25px;
border-radius:15px;
box-shadow:0px 3px 15px rgba(0,0,0,0.1);
}

.lista h2{
color:#1565C0;
margin-bottom:20px;
}

.notificacao{
background:#f9f9f9;
padding:18px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0px 2px 5px rgba(0,0,0,0.08);
border-left:6px solid #FBC02D;
}

.notificacao p{
color:#333;
font-size:16px;
line-height:1.5;
}

.notificacao span{
display:block;
margin-top:8px;
color:#777;
font-size:14px;
}

.vazio{
text-align:center;
color:#777;
font-style:italic;
padding:30px;
}

</style>

</head>

<body>

<div class="topo">

<div class="logo">
<h1>DIM</h1>
<p>Daily Interactive Management</p>
</div>

<div class="menu">

<a href="/dashboard">
<button>Dashboard</button>
</a>

<a href="/projetos">
<button>Projetos</button>
</a>

<a href="/tarefas">
<button>Tarefas</button>
</a>

<a href="/notificacoes">
<button>Notificações</button>
</a>

<a href="/perfil">
<button>Perfil</button>
</a>

<a href="/logout">
<button class="sair">Sair</button>
</a>

</div>

</div>



<div class="container">

<div class="lista">

<h2>Notificações</h2>

{% if notificacoes %}

{% for notificacao in notificacoes %}

<div class="notificacao">

<p>{{ notificacao[1] }}</p>

<span>Atualização do sistema DIM</span>

</div>

{% endfor %}

{% else %}

<div class="vazio">
Nenhuma notificação registrada até o momento.
</div>

{% endif %}

</div>

</div>

</body>
</html>
