<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Perfil - DIM</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
width:550px;
padding:40px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
text-align:center;
}

.logo{
font-size:60px;
font-weight:bold;
color:#1565C0;
margin-bottom:5px;
}

.subtitulo{
font-size:17px;
color:#666;
margin-bottom:30px;
}

h2{
color:#1565C0;
margin-bottom:25px;
font-size:32px;
}

.info{
background:#f9f9f9;
padding:20px;
border-radius:15px;
margin-bottom:20px;
text-align:left;
box-shadow:0px 2px 8px rgba(0,0,0,0.08);
}

.info p{
font-size:18px;
margin-bottom:12px;
color:#333;
}

.estatisticas{
display:flex;
gap:15px;
justify-content:center;
margin:25px 0;
}

.card{
background:#f4f6f9;
padding:20px;
border-radius:15px;
width:200px;
box-shadow:0px 2px 8px rgba(0,0,0,0.08);
}

.card h3{
color:#1565C0;
font-size:32px;
}

.card p{
color:#555;
margin-top:5px;
}

.botoes{
display:flex;
gap:15px;
justify-content:center;
margin-top:25px;
}

.botao-azul{
background:#1565C0;
color:white;
padding:14px 25px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

.botao-amarelo{
background:#FBC02D;
color:black;
padding:14px 25px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

</style>

</head>
<body>

<div class="container">

<div class="logo">
DIM
</div>

<div class="subtitulo">
Daily Interactive Management
</div>

<h2>Perfil do Usuário</h2>

<div class="info">

<p><b>Nome:</b> {{ usuario[0] }}</p>

<p><b>Email:</b> {{ usuario[1] }}</p>

<p><b>Função:</b> Membro do Time</p>

</div>

<div class="estatisticas">

<div class="card">
<h3>{{ total_tarefas }}</h3>
<p>Total de tarefas</p>
</div>

<div class="card">
<h3>{{ tarefas_concluidas }}</h3>
<p>Tarefas concluídas</p>
</div>

</div>

<div class="botoes">

<a href="/dashboard" class="botao-azul">
Voltar ao Dashboard
</a>

<a href="/logout" class="botao-amarelo">
Sair
</a>

</div>

</div>

</body>
</html>
