<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Perfil - DIM</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
padding:20px;
}

.topo{
background:#1565C0;
color:white;
padding:25px;
border-radius:15px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
box-shadow:0px 5px 15px rgba(0,0,0,0.2);
}

.logo h1{
font-size:45px;
}

.logo p{
font-size:16px;
opacity:0.9;
}

.menu{
display:flex;
gap:10px;
align-items:center;
}

.menu a{
text-decoration:none;
}

.menu button{
background:white;
color:#1565C0;
border:none;
padding:12px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.sair{
background:#FBC02D !important;
color:black !important;
}

.container{
max-width:1000px;
margin:auto;
}

.card-principal{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0px 3px 15px rgba(0,0,0,0.1);
margin-bottom:25px;
}

.card-principal h2{
color:#1565C0;
margin-bottom:20px;
font-size:36px;
text-align:center;
}

.info{
background:#f9f9f9;
padding:20px;
border-radius:15px;
margin-top:20px;
box-shadow:0px 2px 8px rgba(0,0,0,0.08);
}

.info p{
font-size:20px;
margin-bottom:15px;
color:#333;
}

.estatisticas{
display:flex;
justify-content:center;
gap:25px;
margin-top:30px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
width:250px;
text-align:center;
box-shadow:0px 3px 15px rgba(0,0,0,0.1);
}

.card h3{
font-size:42px;
color:#1565C0;
margin-bottom:10px;
}


.botao-editar{
    display:inline-block;
    background:#F4C542;
    color:black;
    padding:12px 22px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    font-size:15px;
    margin-top:20px;
    transition:0.3s;
}

.botao-editar:hover{
    background:#e0b12d;
}

.card-principal a{
    text-decoration:none;
}

.card p{
color:#555;
}

.card p{
color:#555;
}

</style>

</head>

<body>

<div class="topo">

<div class="logo">
<h1>DIM</h1>
<p>Daily Interactive Management</p>
</div>

<div class="menu">

<a href="/dashboard">
<button>🏠 Dashboard</button>
</a>

<a href="/projetos">
<button>📁 Projetos</button>
</a>

<a href="/tarefas">
<button>📋 Tarefas</button>
</a>

<a href="/notificacoes">
<button>🔔 Notificações</button>
</a>

<a href="/perfil">
<button>👤 Perfil</button>
</a>

<a href="/logout">
<button class="sair">Sair</button>
</a>

</div>

</div>



<div class="container">

<div class="card-principal">

<h2>Perfil do Usuário</h2>

<div class="info">

<p><b>Nome:</b> {{ usuario[0] }}</p>

<p><b>Email:</b> {{ usuario[1] }}</p>

<p><b>Função:</b> Membro do Time</p>

</div>

<div style="text-align:center; margin-top:20px;">
    <a href="/editar_perfil" class="botao-editar">
        ✏️ Editar Perfil
    </a>
</div>

</div>

<div class="estatisticas">

<div class="card">

<h3>{{ total_tarefas }}</h3>

<p>Total de tarefas</p>

</div>

<div class="card">

<h3>{{ tarefas_concluidas }}</h3>

<p>Tarefas concluídas</p>

</div>

</div>

</div>

</body>
</html>
